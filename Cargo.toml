[package]
name = "MVCCBPlusTree"
version = "0.0.13"
edition = "2021"
authors = ["Amir El-Shaikh <elshaikh@mathematik.uni-marburg.de>"]
description = "Experimental Concurrency Control CRUD MVB+Tree Implementation"
repository = "https://github.com/umr-dbs/MVCCBPlusTree"

[lib]
name = "mvcc_bplustree"
path = "src/lib.rs"
crate-type = ["cdylib"]

[profile.dev]
overflow-checks = false

[profile.release]
overflow-checks = false

[features]
olc-hle = []
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
hashbrown = "0.15.2"
crossbeam = "0.8.4"
chrono = "0.4.40"
rand_distr = "0.5.1"
rand = "0.9.0"
num_cpus = "1.16.0"
itertools = "0.14.0"
parking_lot = { version = "0.12.3", features = ["hardware-lock-elision"] }
serde = { version ="1.0.219", features = ["derive", "rc"] }
serde_json = { version = "1.0.140" }
crossbeam-channel = "0.5.14"
[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2.171"
sysinfo = "0.33.1"
raw-cpuid = "11.5.0"